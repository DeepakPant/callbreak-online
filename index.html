    <style>
        /* 1. Base setup: Remove fixed vh to prevent overflow in iframes */
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Inter', sans-serif;
        }

        /* 2. The App wrapper: Must be 100% of the PARENT, not the screen */
        #app {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* 3. The Container: flex: 1 makes it take all remaining space */
        #game-container {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }

        /* 4. Canvas: contain ensures Phaser keeps its aspect ratio without black bars */
        canvas {
            max-width: 100% !important;
            max-height: 100% !important;
            object-fit: contain;
        }

        /* 5. Portrait Message: Only shows when NOT in fullscreen */
        #rotate-message {
            display: none;
            color: #888;
            font-size: 14px;
            padding: 8px 0;
            background: #1a1a1a;
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        @media screen and (orientation: portrait) {
            #app:not(:fullscreen) #rotate-message {
                display: block;
            }

            #app:not(-webkit-full-screen) #rotate-message {
                display: block;
            }
        }
    </style>
